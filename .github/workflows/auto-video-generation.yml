name: 📹 Auto Video Generation

on:
  push:
    paths:
      - 'articles/**/*.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    timeout-minutes: 60
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'

      - name: 🔧 Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: 📦 Install JS Dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: 🎬 Generate Missing Videos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        timeout-minutes: 55
        run: |
          set -e
          echo "✓ Node: $(node --version)"
          echo "✓ FFmpeg: $(ffmpeg -version 2>&1 | head -1 || echo 'MISSING')"
          echo "✓ API Key: $([ -n \"$GEMINI_API_KEY\" ] && echo 'SET' || echo 'MISSING')"
          
          FILES=$(find articles -name "*.md" ! -name "REPORT.md" -type f | head -20)
          FILE_COUNT=$(echo "$FILES" | wc -l)
          echo "Found $FILE_COUNT articles to process"
          
          SUCCESS=0; FAILED=0; SKIPPED=0
          
          for file in $FILES; do
            [ -z "$file" ] && continue
            dir=$(dirname "$file")
            base=$(basename "$file" .md)
            video_file="$dir/$base.mp4"
            if [ ! -f "$video_file" ]; then
              echo "📹 Processing: $file"
              if timeout 600 npx tsx promo_video/src/cli.ts "$file" 2>&1; then
                if [ -f "$video_file" ]; then
                  size=$(stat -c%s "$video_file" 2>/dev/null || echo 0)
                  size_mb=$((size / 1024 / 1024))
                  if [ $size -gt $((25 * 1024 * 1024)) ]; then
                    echo "⚠️ Video too large, removing..."
                    rm "$video_file"
                    ((FAILED++))
                  else
                    echo "✅ Video OK (${size_mb}MB)"
                    ((SUCCESS++))
                  fi
                else
                  echo "⚠️ Video file not created"
                  ((FAILED++))
                fi
              else
                echo "❌ CLI failed"
                ((FAILED++))
              fi
            else
              echo "⏭️ Skipping (exists): $base.mp4"
              ((SKIPPED++))
            fi
          done
          
          echo "✅ Success: $SUCCESS | ❌ Failed: $FAILED | ⏭️ Skipped: $SKIPPED"

      - name: 🔐 Git Config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 📤 Push New Videos
        run: |
          git add articles/**/*.mp4 2>/dev/null || echo "No .mp4 files to add"
          git add articles/**/.assets_*/manifest.json 2>/dev/null || echo "No manifest files to add"
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-generated promo videos [skip ci]"
            git push
          else
            echo "ℹ️ No changes to commit"
          fi
