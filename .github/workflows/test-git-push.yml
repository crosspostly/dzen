name: TEST - Git Push

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create test file
        run: echo "test-$(date +%s)" > test-git-push-$(date +%s).txt

      - name: Commit and push with ours strategy
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          rm -f *.log
          git add -A
          git commit -m "TEST ours strategy $(date +%H:%M:%S)"
          git pull --no-rebase -X ours origin main
          git push origin main
          echo "=== EXIT: $? ==="
