name: 🔍 TypeCheck

on:
  push:
    branches: [main]
    paths:
      - '**/*.ts'
      - 'tsconfig.json'
  pull_request:
    paths:
      - '**/*.ts'
      - 'tsconfig.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔍 Run tsc --noEmit
        run: npx tsc --noEmit
