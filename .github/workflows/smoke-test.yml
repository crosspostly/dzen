name: 🔥 Smoke Test (GitHub Save Check)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke:
    name: 🔥 Проверка сохранения (30 сек)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ⏱️ Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⏱️ Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install deps
        run: npm install

      - name: 🚀 RUN SMOKE PUSH
        run: npx tsx cli.ts smoke-push
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ✅ Final Result
        run: echo "🏆 Тест сохранения прошел успешно! Можно запускать основную генерацию."
