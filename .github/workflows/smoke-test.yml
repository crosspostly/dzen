name: 🔥 Smoke Test - Быстрая проверка (AI + GitHub push)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ⏱️ [1/6] Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⏱️ [2/6] Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ⏱️ [3/6] Check environment
        run: |
          echo "=== NODE VERSION ==="
          node --version
          echo "=== NPM VERSION ==="
          npm --version
          echo "=== INSTALL DEPS ==="
          npm install
          echo "=== TSX VERSION ==="
          npx tsx --version
          echo "✅ Окружение готово"

      - name: ⏱️ [4/6] Gemini API call + create article + image
        run: |
          echo "=== GEMINI API SMOKE TEST ==="
          START=$(date +%s)

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"contents": [{"parts": [{"text": "Напиши 1 заголовок статьи для яндекс-Дзен в жанре этно-туризм. Только заголовок, без пояснений."}]}]}')

          END=$(date +%s)
          ELAPSED=$((END - START))

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE"

          TITLE=$(echo "$RESPONSE" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const j=JSON.parse(d);
            const text = j.candidates?.[0]?.content?.parts?.[0]?.text || '';
            if (!text) { console.error('ERROR: no text in response'); process.exit(1); }
            console.log(text.trim());
          ")

          echo ""
          echo "=== РЕЗУЛЬТАТ ==="
          echo "⏱️  Время ответа: ${ELAPSED}s"
          echo "📝 Заголовок: $TITLE"
          echo "✅ Gemini API работает"

          TODAY=$(date +%Y-%m-%d)
          OUTDIR="articles/_smoke-test/$TODAY"
          mkdir -p "$OUTDIR"

          cat > "$OUTDIR/smoke-article.md" << MDEOF
---
title: "$TITLE"
date: "$TODAY"
channel: _smoke-test
smoke_test: true
gemini_response_time: ${ELAPSED}s
---

# $TITLE

Это smoke-test статья. Сгенерировано: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

**Gemini API:** ответил за ${ELAPSED}s
**Модель:** gemini-2.0-flash
**Git push:** проверяется...
MDEOF

          # Создаём PNG-заглушку (имитация обложки)
          node -e "
            const fs = require('fs');
            const png = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==', 'base64');
            fs.writeFileSync('$OUTDIR/smoke-cover.jpg', png);
            console.log('✅ Cover placeholder (1x1 PNG) создан');
          "

          echo ""
          echo "=== СОЗДАННЫЕ ФАЙЛЫ ==="
          ls -la "$OUTDIR/"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ⏱️ [5/6] Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: ⏱️ [6/6] Push to GitHub
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const maxRetries = 3;
            const retryDelay = 2000;

            async function pushWithRetry() {
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  console.log(`\n🔄 Пуш попытка ${attempt}/${maxRetries}...`);

                  execSync('git fetch origin main', { stdio: 'inherit' });
                  execSync('git rebase origin/main', { stdio: 'inherit' });

                  // -f чтобы добавить даже если в .gitignore
                  execSync('git add -f articles/_smoke-test/', { stdio: 'inherit' });

                  console.log('=== GIT STATUS ===');
                  execSync('git status', { stdio: 'inherit' });
                  console.log('=== STAGED FILES ===');
                  execSync('git diff --cached --stat', { stdio: 'inherit' });

                  try {
                    execSync('git diff --cached --quiet');
                    console.log('⚠️ Нет новых файлов — нечего коммитить');
                    return true;
                  } catch (e) { /* есть изменения */ }

                  const ts = new Date().toISOString();
                  execSync(`git commit -m "🔥 SMOKE TEST OK: ${ts}"`, { stdio: 'inherit' });

                  console.log('=== PUSHING ===');
                  execSync('git push origin main', { stdio: 'inherit' });

                  console.log('\n✅ ВСЁ РАБОТАЕТ! Smoke test пройден.');
                  console.log('✅ Gemini API: OK');
                  console.log('✅ Git push: OK');
                  console.log('✅ Файлы сохранены в GitHub');
                  return true;

                } catch (error) {
                  console.error(`❌ Ошибка на попытке ${attempt}:`, error.message);
                  if (attempt === maxRetries) throw error;
                  try { execSync('git rebase --abort', { stdio: 'pipe' }); } catch(e) {}
                  try { execSync('git reset --hard HEAD', { stdio: 'pipe' }); } catch(e) {}
                  await new Promise(r => setTimeout(r, retryDelay));
                }
              }
            }

            await pushWithRetry();
