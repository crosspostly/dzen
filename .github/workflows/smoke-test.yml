name: 🔥 Smoke Test - Быстрая проверка (AI + GitHub push)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ⏱️ [1/6] Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⏱️ [2/6] Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: ⏱️ [3/6] Check environment
        run: |
          echo "=== NODE VERSION ==="
          node --version
          npm --version
          npm install
          npx tsx --version
          echo "✅ Окружение готово"

      - name: 🔍 [3.5/6] Diagnose secrets + network
        run: |
          echo "=== SECRETS DIAGNOSTICS ==="
          LEN=${#GEMINI_API_KEY}
          echo "✅ GEMINI_API_KEY длина: $LEN"

          echo ""
          echo "=== RUNNER IP ==="
          curl -s https://api.ipify.org && echo ""
          curl -s https://ipinfo.io/country && echo ""
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ⏱️ [4/6] Gemini API call + create article + image
        run: |
          echo "=== GEMINI API SMOKE TEST ==="
          START=$(date +%s)

          # Пишем JSON в файл чтобы избежать проблем с юникодом в shell
          cat > /tmp/request.json << 'JSONEOF'
          {"contents": [{"parts": [{"text": "Напиши 1 заголовок статьи для яндекс-Дзен в жанре этно-туризм. Только заголовок, без пояснений."}]}]}
          JSONEOF

          # Используем X-goog-api-key header вместо ?key= в URL
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "X-goog-api-key: $GEMINI_API_KEY" \
            -d @/tmp/request.json)

          END=$(date +%s)
          ELAPSED=$((END - START))

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE"

          TITLE=$(echo "$RESPONSE" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const j=JSON.parse(d);
            const text = j.candidates?.[0]?.content?.parts?.[0]?.text || '';
            if (!text) { console.error('ERROR: no text in response'); process.exit(1); }
            console.log(text.trim());
          ")

          echo ""
          echo "=== РЕЗУЛЬТАТ ==="
          echo "⏱️  ${ELAPSED}s"
          echo "📝 $TITLE"
          echo "✅ Gemini API работает"

          TODAY=$(date +%Y-%m-%d)
          OUTDIR="articles/_smoke-test/$TODAY"
          mkdir -p "$OUTDIR"

          cat > "$OUTDIR/smoke-article.md" << MDEOF
---
title: "$TITLE"
date: "$TODAY"
channel: _smoke-test
smoke_test: true
gemini_response_time: ${ELAPSED}s
---

# $TITLE

Сгенерировано: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
**Gemini:** ${ELAPSED}s | gemini-2.0-flash | Node 22 | checkout@v5
MDEOF

          node -e "
            const fs = require('fs');
            const png = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==', 'base64');
            fs.writeFileSync('$OUTDIR/smoke-cover.jpg', png);
          "
          ls -la "$OUTDIR/"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ⏱️ [5/6] Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: ⏱️ [6/6] Push to GitHub
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const maxRetries = 3;
            const retryDelay = 2000;

            async function pushWithRetry() {
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  console.log(`\n🔄 Пуш попытка ${attempt}/${maxRetries}...`);
                  execSync('git fetch origin main', { stdio: 'inherit' });
                  execSync('git rebase origin/main', { stdio: 'inherit' });
                  execSync('git add -f articles/_smoke-test/', { stdio: 'inherit' });
                  execSync('git status', { stdio: 'inherit' });
                  execSync('git diff --cached --stat', { stdio: 'inherit' });

                  try {
                    execSync('git diff --cached --quiet');
                    console.log('⚠️ Нечего коммитить');
                    return true;
                  } catch (e) {}

                  const ts = new Date().toISOString();
                  execSync(`git commit -m "🔥 SMOKE TEST OK: ${ts}"`, { stdio: 'inherit' });
                  execSync('git push origin main', { stdio: 'inherit' });

                  console.log('✅ ВСЁ РАБОТАЕТ! Gemini + Node 22 + checkout@v5 + push OK');
                  return true;

                } catch (error) {
                  console.error(`❌ ${attempt}:`, error.message);
                  if (attempt === maxRetries) throw error;
                  try { execSync('git rebase --abort', { stdio: 'pipe' }); } catch(e) {}
                  try { execSync('git reset --hard HEAD', { stdio: 'pipe' }); } catch(e) {}
                  await new Promise(r => setTimeout(r, retryDelay));
                }
              }
            }
            await pushWithRetry();
