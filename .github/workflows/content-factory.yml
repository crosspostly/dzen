name: Фабрика контента - Генерация статей (Дзен)

on:
  schedule:
    # Запуск в 05:00 UTC каждый день
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество статей (1, 5, 7, 8, 10, 25, 50, 100)'
        required: true
        default: '1'
        type: choice
        options: ['1', '5', '7', '8', '10', '25', '50', '100']
      channel:
        description: 'Тематика канала'
        required: true
        default: 'ethno-food-ritual'
        type: choice
        options: ['ethno-food-ritual', 'budget-travel', 'nomad-tech']
      images:
        description: 'Генерировать обложки?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 📥 Получение кода (Checkout)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: 🔧 Установка системных зависимостей (Canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      
      - name: 📦 Установка зависимостей
        run: npm install
      
      - name: ✍️ Генерация статей
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            COUNT="8"; CHANNEL="ethno-food-ritual"; IMAGES="true"
          else
            COUNT="${{ inputs.count }}"; CHANNEL="${{ inputs.channel }}"; IMAGES="${{ inputs.images }}"
          fi
          
          CMD="node --import tsx cli.ts factory --count=$COUNT --channel=$CHANNEL"
          if [ "$IMAGES" = "true" ]; then CMD="$CMD --images"; fi
          
          echo "🚀 Running: $CMD"
          eval "$CMD" 2>&1 | tee publish.log
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🔧 Восстановление статей (Auto-restore)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CHANNEL="${{ inputs.channel || 'ethno-food-ritual' }}"
          TARGET_DIR="articles/$CHANNEL/$(date +%Y-%m-%d)"
          if [ -d "$TARGET_DIR" ]; then
            FILES=$(find "$TARGET_DIR" -name "*.md" -type f)
            if [ ! -z "$FILES" ]; then
               node scripts/restore-articles-safe.js $(echo "$FILES" | tr '\n' ' ')
            fi
          fi

      - name: 📊 Подсчет результатов
        if: always()
        run: |
          echo "Итоги генерации:"
          find ./articles -name "*.md" 2>/dev/null | wc -l | xargs echo "Статей:"
          find ./articles -name "*.jpg" 2>/dev/null | wc -l | xargs echo "Картинок:"
      
      - name: 🔐 Сохранение изменений в GitHub
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Явно добавляем файлы, игнорируя возможные ограничения .gitignore (на всякий случай)
          git add -f articles/
          
          # Проверяем, есть ли что коммитить
          if git diff --cached --quiet; then
            echo "✅ Изменений нет, коммит не требуется."
          else
            echo "🚀 Коммит новых статей..."
            git commit -m "🚀 AUTO: Generated articles $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
      
      - name: 💾 Фиксация ошибок
        if: failure()
        run: |
          echo "### ❌ ОШИБКА ГЕНЕРАЦИИ СТАТЕЙ $(date)" > ERROR_REPORT.md
          tail -n 100 publish.log >> ERROR_REPORT.md 2>/dev/null || echo "Лог не найден" >> ERROR_REPORT.md
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ERROR_REPORT.md
          git commit -m "🚨 ALERT: Content Factory Failed"
          git push origin main

  notify-on-error:
    runs-on: ubuntu-latest
    needs: factory
    if: failure()
    steps:
      - name: 📧 Send Email Notification
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ❌ Dzen Content Factory Failed
          body: "Ошибка при генерации статей. См. https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          to: sheepoff@gmail.com
          from: Dzen Bot
          secure: true
        continue-on-error: true
