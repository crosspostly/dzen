name: Фабрика контента - Генерация статей (Дзен)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество статей'
        required: true
        default: '1'
        type: choice
        options: ['1', '5', '7', '8', '10', '25', '50', '100']
      channel:
        description: 'Канал'
        required: true
        default: 'ethno-food-ritual'
        type: choice
        options: ['ethno-food-ritual', 'budget-travel', 'nomad-tech']
      images:
        description: 'Генерировать обложки?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  factory:
    name: ✨ Generate Articles
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 🔧 Install Canvas deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: 📦 Install deps
        run: npm install

      - name: ✍️ Generate
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            COUNT="8"; CHANNEL="ethno-food-ritual"; IMAGES="true"
          else
            COUNT="${{ inputs.count }}"; CHANNEL="${{ inputs.channel }}"; IMAGES="${{ inputs.images }}"
          fi
          CMD="node --import tsx cli.ts factory --count=$COUNT --channel=$CHANNEL"
          [ "$IMAGES" = "true" ] && CMD="$CMD --images"
          echo "🚀 Running: $CMD"
          eval "$CMD"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🔐 Save to GitHub
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet && echo "✅ Нет изменений" && exit 0
          git commit -m "🚀 AUTO: Generated content $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --no-rebase -X ours origin main && git push origin main && exit 0
            sleep 5
          done
          exit 1
