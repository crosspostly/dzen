name: Фабрика контента - Генерация статей (Дзен)

on:
  schedule:
    # Запуск в 04:00 UTC каждый день
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество статей (1, 5, 10, 25, 50, 100)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '5'
          - '7'
          - '10'
          - '25'
          - '50'
          - '100'
      channel:
        description: 'Тематика канала'
        required: true
        default: 'women-35-60'
        type: choice
        options:
          - 'women-35-60'
          - 'young-moms'
          - 'men-25-40'
          - 'teens'
      images:
        description: 'Генерировать обложки?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 📥 Получение кода (Checkout)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 🔧 Установка системных зависимостей (Canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      
      - name: 📦 Установка зависимостей
        run: npm install
      
      - name: ✍️ Генерация статей
        run: |
          # Определение параметров в зависимости от триггера
          if [ "${{ github.event_name }}" == "schedule" ]; then
            COUNT="2"
            CHANNEL="women-35-60"
            IMAGES="true"
            echo "⏰ Запуск по расписанию: Используем настройки 2026 (2 статьи в день, буфер для 1 публикации)"
          else
            COUNT="${{ inputs.count }}"
            CHANNEL="${{ inputs.channel }}"
            IMAGES="${{ inputs.images }}"
            echo "👋 Ручной запуск: Используем введенные параметры"
          fi
          
          echo "====================================================="
          echo "🚀 Фабрика контента - Генерация пачки статей"
          echo "====================================================="
          echo "Количество:    $COUNT"
          echo "Канал:         $CHANNEL"
          echo "Картинки:      $IMAGES"
          echo "Выход в:       articles/$CHANNEL/$(date +%Y-%m-%d)/"
          echo "====================================================="
          echo ""
          
          CMD="npx tsx cli.ts factory --count=$COUNT --channel=$CHANNEL"
          
          if [ "$IMAGES" = "true" ]; then
            CMD="$CMD --images"
          fi
          
          echo "Запуск команды: $CMD"
          echo ""
          
          eval "$CMD"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINAL_CLEANUP_ENABLED: true
          CLEANUP_THRESHOLD: medium
          CLEANUP_MODEL: gemini-2.0-flash
          CLEANUP_TEMPERATURE: 0.3
          CLEANUP_MAX_RETRIES: 2

      - name: 🔧 Восстановление статей (Auto-restore)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Определяем параметры (дублируем логику, чтобы быть уверенными)
          if [ "${{ github.event_name }}" == "schedule" ]; then
            CHANNEL="women-35-60"
          else
            CHANNEL="${{ inputs.channel }}"
          fi
          
          TODAY=$(date +%Y-%m-%d)
          TARGET_DIR="articles/$CHANNEL/$TODAY"
          
          echo "====================================================="
          echo "🔧 Запуск восстановления для: $TARGET_DIR"
          echo "====================================================="
          
          if [ -d "$TARGET_DIR" ]; then
            # Находим все .md файлы в сегодняшней папке
            FILES=$(find "$TARGET_DIR" -name "*.md" -type f)
            
            if [ -z "$FILES" ]; then
               echo "⚠️ Файлы .md не найдены в $TARGET_DIR"
            else
               # Преобразуем переносы строк в пробелы для передачи аргументами
               FILES_ARGS=$(echo "$FILES" | tr '\n' ' ')
               
               echo "Обработка файлов:"
               echo "$FILES"
               echo ""
               
               node scripts/restore-articles-safe.js $FILES_ARGS
            fi
          else
            echo "⚠️ Папка $TARGET_DIR не найдена (возможно, генерация не создала файлы?)"
          fi

      - name: 📊 Подсчет результатов
        if: always()
        run: |
          ARTICLE_COUNT=$(find ./articles -name "*.txt" 2>/dev/null | wc -l)
          IMAGE_COUNT=$(find ./articles -name "*.jpg" 2>/dev/null | xargs wc -l | tail -1 | awk '{print $1}' || find ./articles -name "*.png" 2>/dev/null | wc -l)
          
          echo ""
          echo "Итоги генерации:"
          echo "====================================================="
          echo "Статей создано:   $ARTICLE_COUNT"
          echo "Картинок создано: $IMAGE_COUNT"
          echo "====================================================="
          echo ""
      
      - name: 📦 Загрузка артефактов
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: articles-${{ inputs.channel || 'scheduled' }}-${{ github.run_id }}
          path: articles/
          retention-days: 90
          if-no-files-found: warn
      
      - name: 🔐 Настройка Git
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: 📤 Отправка изменений (Push)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            const maxRetries = 3;
            const retryDelay = 2000;
            
            async function pushWithRetry() {
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  console.log(`\n🔄 Попытка отправки ${attempt}/${maxRetries}...`);
                  
                  console.log('📥 Получение свежих данных из репозитория...');
                  execSync('git fetch origin ${{ github.ref_name }}', { stdio: 'inherit' });
                  
                  console.log('⚙️  Слияние изменений (Rebase)...');
                  execSync('git rebase origin/${{ github.ref_name }}', { stdio: 'inherit' });
                  
                  console.log('📂 Добавление файлов (только статьи)...');
                  execSync('git add articles/', { stdio: 'inherit' });
                  
                  console.log('📊 Статус git после add:');
                  execSync('git status', { stdio: 'inherit' });
                  
                  try {
                    execSync('git diff --cached --quiet');
                    console.log('⚠️  Нет изменений для коммита');
                    return true;
                  } catch (e) {
                    // git diff возвращает 1, если есть изменения - это то, что нам нужно
                  }
                  
                  console.log('💾 Создание коммита...');
                  const timestamp = new Date().toISOString().split('T')[0];
                  let message = '';
                  const eventName = '${{ github.event_name }}';
                  
                  if (eventName === 'schedule') {
                     message = `🤖 Ежедневный контент: 1 качественная статья (${timestamp})`;
                  } else {
                     const channel = '${{ inputs.channel }}';
                     const count = '${{ inputs.count }}';
                     message = `📝 Генерация статей: ${timestamp} - ${count} шт. (${channel})`;
                  }
                  
                  execSync(`git commit -m "${message}"`, { stdio: 'inherit' });
                  
                  console.log('🚀 Отправка на GitHub...');
                  execSync('git push origin ${{ github.ref_name }}', { stdio: 'inherit' });
                  
                  console.log('✅ Успешно отправлено!');
                  return true;
                  
                } catch (error) {
                  if (attempt === maxRetries) {
                    console.error(`\n❌ Ошибка после ${maxRetries} попыток`);
                    throw error;
                  } else {
                    console.log(`⚠️  Попытка ${attempt} не удалась. Повтор через ${retryDelay}мс...`);
                    try { execSync('git reset --hard HEAD', { stdio: 'pipe' }); } catch (e) {}
                    await new Promise(resolve => setTimeout(resolve, retryDelay));
                  }
                }
              }
            }
            
            await pushWithRetry();
