name: Фабрика контента - Генерация статей (Дзен)

on:
  schedule:
    # Запуск в 05:00 UTC каждый день
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество статей (1, 5, 10, 25, 50, 100)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '5'
          - '7'
          - '10'
          - '25'
          - '50'
          - '100'
      channel:
        description: 'Тематика канала (Ethno, Budget, Nomad)'
        required: true
        default: 'ethno-food-ritual'
        type: choice
        options:
          - 'ethno-food-ritual'
          - 'budget-travel'
          - 'nomad-tech'
      images:
        description: 'Генерировать обложки?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 📥 Получение кода (Checkout)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 🔧 Установка системных зависимостей (Canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      
      - name: 📦 Установка зависимостей
        run: npm install
      
      - name: ✍️ Генерация статей
        run: |
          # Определение параметров в зависимости от триггера
          if [ "${{ github.event_name }}" == "schedule" ]; then
            COUNT="8"
            CHANNEL="ethno-food-ritual"
            IMAGES="true"
            echo "⏰ Запуск по расписанию: Используем настройки по умолчанию (8 статей, ethno-food-ritual, картинки)"
          else
            COUNT="${{ inputs.count }}"
            CHANNEL="${{ inputs.channel }}"
            IMAGES="${{ inputs.images }}"
            echo "👋 Ручной запуск: Используем введенные параметры"
          fi
          
          echo "====================================================="
          echo "🚀 Фабрика контента - Генерация пачки статей"
          echo "====================================================="
          echo "Количество:    $COUNT"
          echo "Канал:         $CHANNEL"
          echo "Картинки:      $IMAGES"
          echo "Выход в:       articles/$CHANNEL/$(date +%Y-%m-%d)/"
          echo "====================================================="
          echo ""
          
          CMD="npx tsx cli.ts factory --count=$COUNT --channel=$CHANNEL"
          
          if [ "$IMAGES" = "true" ]; then
            CMD="$CMD --images"
          fi
          
          echo "Запуск команды: $CMD"
          echo ""
          
          eval "$CMD"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINAL_CLEANUP_ENABLED: true
          CLEANUP_THRESHOLD: medium
          CLEANUP_MODEL: gemini-2.0-flash
          CLEANUP_TEMPERATURE: 0.3
          CLEANUP_MAX_RETRIES: 2

      - name: 🔧 Восстановление статей (Auto-restore)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Определяем параметры (дублируем логику, чтобы быть уверенными)
          if [ "${{ github.event_name }}" == "schedule" ]; then
            CHANNEL="ethno-food-ritual"
          else
            CHANNEL="${{ inputs.channel }}"
          fi
          
          TODAY=$(date +%Y-%m-%d)
          TARGET_DIR="articles/$CHANNEL/$TODAY"
          
          echo "====================================================="
          echo "🔧 Запуск восстановления для: $TARGET_DIR"
          echo "====================================================="
          
          if [ -d "$TARGET_DIR" ]; then
            # Находим все .md файлы в сегодняшней папке
            FILES=$(find "$TARGET_DIR" -name "*.md" -type f)
            
            if [ -z "$FILES" ]; then
               echo "⚠️ Файлы .md не найдены в $TARGET_DIR"
            else
               # Преобразуем переносы строк в пробелы для передачи аргументами
               FILES_ARGS=$(echo "$FILES" | tr '\n' ' ')
               
               echo "Обработка файлов:"
               echo "$FILES"
               echo ""
               
               node scripts/restore-articles-safe.js $FILES_ARGS
            fi
          else
            echo "⚠️ Папка $TARGET_DIR не найдена (возможно, генерация не создала файлы?)"
          fi

      - name: 📊 Подсчет результатов
        if: always()
        run: |
          ARTICLE_COUNT=$(find ./articles -name "*.txt" 2>/dev/null | wc -l)
          IMAGE_COUNT=$(find ./articles -name "*.jpg" 2>/dev/null | xargs wc -l | tail -1 | awk '{print $1}' || find ./articles -name "*.png" 2>/dev/null | wc -l)
          
          echo ""
          echo "Итоги генерации:"
          echo "====================================================="
          echo "Статей создано:   $ARTICLE_COUNT"
          echo "Картинок создано: $IMAGE_COUNT"
          echo "====================================================="
          echo ""
      
      - name: 📦 Загрузка артефактов
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: articles-${{ inputs.channel || 'scheduled' }}-${{ github.run_id }}
          path: articles/
          retention-days: 90
          if-no-files-found: warn
      
      - name: 🔐 Настройка Git
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: 💾 Фиксация ошибок (если упало)
        if: failure()
        run: |
          echo "### ❌ ОШИБКА ГЕНЕРАЦИИ СТАТЕЙ" > ERROR_REPORT.md
          echo "Дата: $(date)" >> ERROR_REPORT.md
          echo "Workflow: ${{ github.workflow }}" >> ERROR_REPORT.md
          echo "Лог последних строк:" >> ERROR_REPORT.md
          tail -n 50 publish.log 2>/dev/null || echo "Лог не найден" >> ERROR_REPORT.md
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ERROR_REPORT.md
          git commit -m "🚨 ALERT: Content Factory Failed"
          git push origin ${{ github.ref_name }}

  notify-on-error:
    runs-on: ubuntu-latest
    needs: factory
    if: failure()
    steps:
      - name: 📧 Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ❌ Dzen Content Factory Failed
          body: |
            Ошибка при генерации пачки статей.
            Репозиторий: ${{ github.repository }}
            Лог: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: sheepoff@gmail.com
          from: Dzen Bot
          secure: true
        continue-on-error: true
