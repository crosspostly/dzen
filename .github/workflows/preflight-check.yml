name: 🔍 Pre-flight Check

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: 🔍 Pre-flight Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: 📦 Install deps
        run: npm ci
      - name: 🔍 esbuild syntax check
        run: |
          find services -name '*.ts' ! -path '*/__tests__/*' ! -path '*/neuro_experiment/*' | xargs npx esbuild --bundle=false --log-level=error
          echo "✅ Syntax OK!"
      - name: ✅ Check GEMINI_API_KEY
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "❌ GEMINI_API_KEY not set!"; exit 1; fi
          echo "✅ GEMINI_API_KEY is set"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
