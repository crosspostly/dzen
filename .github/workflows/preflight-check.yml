name: 🔍 Pre-flight Check

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: 🔍 Pre-flight Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install deps
        run: npm ci

      - name: 🔍 esbuild syntax check (services)
        run: |
          echo "🔍 Checking syntax with esbuild..."
          find services -name '*.ts' ! -path '*/__tests__/*' | xargs npx esbuild --bundle=false --log-level=error 2>&1
          echo "✅ No syntax errors!"

      - name: 🔍 Run check.sh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bash check.sh
