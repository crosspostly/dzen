name: 🔧 Auto Restore Articles

concurrency:
  group: push-to-main
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    paths:
      - 'articles/**/*.md'
      - '!articles/**/REPORT.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      fix_all:
        description: 'Fix ALL articles in articles/ directory'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  restore-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔍 Get changed files
        id: files
        run: |
          echo "📊 Detecting articles..."
          if [ "${{ github.event.inputs.fix_all }}" = "true" ]; then
            echo "🔄 MODE: Fix ALL articles"
            CHANGED=$(find articles -name "*.md" -not -name "REPORT.md" -type f | sort)
            echo "mode=all" >> $GITHUB_OUTPUT
          else
            echo "📝 MODE: Fix changed articles"
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              CHANGED=$(git diff-tree --no-commit-id --name-only -r "$AFTER" -- 'articles/**/*.md' | grep -v "REPORT.md" || true)
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- 'articles/**/*.md' | grep -v "REPORT.md" || true)
            fi
            echo "mode=changed" >> $GITHUB_OUTPUT
          fi
          if [ -z "$CHANGED" ]; then
            echo "✅ No articles found"
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "📝 Found files:"
            echo "$CHANGED" | while read -r file; do echo "   ✓ $file"; done
            FILES_STR=$(echo "$CHANGED" | tr '\n' ' ')
            echo "files=$FILES_STR" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Restore articles (5-retry strategy)
        if: steps.files.outputs.files != ''
        id: restore
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VERBOSE: ${{ github.event.inputs.verbose || false }}
        run: |
          if [ "$VERBOSE" = "true" ]; then
            node scripts/restore-articles-safe.js --verbose ${{ steps.files.outputs.files }}
          else
            node scripts/restore-articles-safe.js ${{ steps.files.outputs.files }}
          fi
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: 💾 Фиксация ошибок (если упало)
        if: failure()
        run: |
          echo "### ❌ ОШИБКА АВТОРЕСТАВРАЦИИ" > RESTORE_ERROR.md
          echo "Дата: $(date)" >> RESTORE_ERROR.md
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add RESTORE_ERROR.md
          git commit -m "🚨 ALERT: Auto-Restore Failed"
          git push origin main

      - name: 📤 Commit if changed
        if: steps.files.outputs.files != '' && success()
        run: |
          set -e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add articles/
          if git diff --cached --quiet; then
            echo "⚠️  No changes to commit"
            exit 0
          fi
          MODE="${{ steps.files.outputs.mode }}"
          if [ "$MODE" = "all" ]; then
            COMMIT_MSG="🔧 Auto-restore: Fixed ALL articles"
          else
            COMMIT_MSG="🔧 Auto-restore: Fixed formatting"
          fi
          git commit -m "$COMMIT_MSG"
          MAX_RETRIES=5
          RETRY_COUNT=0
          PUSH_SUCCESS=false
          while [ "$RETRY_COUNT" -lt "$MAX_RETRIES" ]; do
            if [ "$RETRY_COUNT" -gt 0 ]; then
              DELAY=$((2 ** RETRY_COUNT))
              echo "⏳ Retry $RETRY_COUNT/$MAX_RETRIES: waiting ${DELAY}s..."
              sleep "$DELAY"
            fi
            if git pull origin main --rebase 2>&1; then
              echo "✅ Pull successful"
            else
              git rebase --abort 2>/dev/null || true
              git pull origin main 2>&1 || true
            fi
            if git push origin HEAD:${{ github.ref }} --verbose 2>&1; then
              echo "✅ Push successful!"
              PUSH_SUCCESS=true
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done
          if [ "$PUSH_SUCCESS" = "false" ]; then
            echo "❌ Push failed after $MAX_RETRIES attempts!"
            exit 1
          fi

      - name: 📊 Summary
        if: always()
        run: |
          echo "========================================="
          echo "✅ Auto-restore complete"
          FILE_COUNT=$(echo '${{ steps.files.outputs.files }}' | wc -w)
          echo "📁 Files processed: $FILE_COUNT"
          git log --oneline -3
          echo "========================================="
