name: Generate RSS Feed

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Generation mode (full or incremental)'
        required: true
        default: 'incremental'
        type: choice
        options:
          - full
          - incremental
      dry_run:
        description: 'Dry run (no commit/push)'
        required: false
        type: boolean
        default: false
      verbose:
        description: 'Verbose logging'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 */4 * * *'
  workflow_run:
    workflows: ["\u0424\u0430\u0431\u0440\u0438\u043a\u0430 \u043a\u043e\u043d\u0442\u0435\u043d\u0442\u0430 - \u0413\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u044f \u0441\u0442\u0430\u0442\u0435\u0439 (\u0414\u0437\u0435\u043d)"]
    types:
      - completed
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-feed:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: 'npm'

    - name: Cache node modules
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-modules-

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm install

    - name: Set environment variables
      run: |
        echo "GITHUB_REPOSITORY=${{ github.repository }}" >> $GITHUB_ENV
        echo "DRY_RUN=${{ github.event.inputs.dry_run || false }}" >> $GITHUB_ENV
        echo "VERBOSE=${{ github.event.inputs.verbose || false }}" >> $GITHUB_ENV

    - name: Generate RSS feed
      run: |
        MODE="${{ github.event.inputs.mode || 'incremental' }}"
        VERBOSE="${{ github.event.inputs.verbose || 'false' }}"
        echo "\ud83d\ude80 Running RSS generator in $MODE mode..."
        if [ "$VERBOSE" = "true" ]; then
          node scripts/generate-feed.js $MODE --verbose
        else
          node scripts/generate-feed.js $MODE
        fi

    - name: Validate RSS feed
      run: node scripts/validate-rss.js public/feed.xml

    - name: Commit and push if changed
      if: ${{ github.event.inputs.dry_run != 'true' }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/feed.xml
        if [ -d "public/articles" ] && [ "$(ls -A public/articles)" ]; then
          git add public/articles/
        fi
        if git diff --staged --quiet; then
          echo "\u2705 No changes to commit"
        else
          git commit -m "chore(rss): update feed and html mirrors [${{ github.event.inputs.mode || 'incremental' }} mode]"
          git push
        fi
      continue-on-error: true

    - name: Summary
      if: always()
      run: |
        echo "### \ud83d\udcca Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Mode**: ${{ github.event.inputs.mode || 'incremental' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Dry Run**: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: \u2705 Completed" >> $GITHUB_STEP_SUMMARY

  notify-on-error:
    runs-on: ubuntu-latest
    needs: generate-feed
    if: failure()
    steps:
      - name: "\ud83d\udcbe \u0424\u0438\u043a\u0441\u0430\u0446\u0438\u044f \u043e\u0448\u0438\u0431\u043e\u043a"
        run: |
          echo "### \u274c \u041e\u0428\u0418\u0411\u041a\u0410 \u0413\u0415\u041d\u0415\u0420\u0410\u0426\u0418\u0418 RSS" > FEED_ERROR.md
          echo "\u0414\u0430\u0442\u0430: $(date)" >> FEED_ERROR.md
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add FEED_ERROR.md
          git commit -m "\ud83d\udea8 ALERT: RSS Feed Generation Failed"
          git push origin main

      - name: "\ud83d\udce7 Send Email Notification"
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "\u274c Dzen RSS Generation Failed"
          body: |
            \u041e\u0448\u0438\u0431\u043a\u0430 \u043f\u0440\u0438 \u0433\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u0438 RSS \u0444\u0438\u0434\u0430.
            \u0420\u0435\u043f\u043e\u0437\u0438\u0442\u043e\u0440\u0438\u0439: ${{ github.repository }}
            \u041b\u043e\u0433: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: sheepoff@gmail.com
          from: Dzen Bot
          secure: true
        continue-on-error: true
