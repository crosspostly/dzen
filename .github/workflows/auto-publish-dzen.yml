name: 🤖 Auto-Publish to Dzen Every 3 Hours

on:
  schedule:
    - cron: '0 7,12,17,22 * * *'
    - cron: '30 9,14,19 * * *'
  workflow_dispatch:        # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 🔐 Validate GitHub Secret (DZEN_COOKIES_JSON)
        run: |
          if [ -z "${{ secrets.DZEN_COOKIES_JSON }}" ]; then
            echo "❌ ERROR: Secret 'DZEN_COOKIES_JSON' not found!"
            exit 1
          fi
          SECRET_SIZE=${#DZEN_COOKIES_JSON}
          echo "✅ Secret 'DZEN_COOKIES_JSON' found! Size: $SECRET_SIZE characters"
          echo "$DZEN_COOKIES_JSON" | python3 -m json.tool > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "✅ Valid JSON format"
          else
            echo "⚠️  Warning: Cookies may not be valid JSON"
          fi
        env:
          DZEN_COOKIES_JSON: ${{ secrets.DZEN_COOKIES_JSON }}

      - name: 📄 Check feed.xml exists
        run: |
          if [ -f "public/feed.xml" ]; then
            ITEM_COUNT=$(grep -c "<item>" "public/feed.xml" || echo "0")
            echo "✅ feed.xml found. Articles: $ITEM_COUNT"
          else
            echo "❌ ERROR: feed.xml not found"
            exit 1
          fi

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install Canvas deps (for image processing)
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: 🎬 Install Playwright
        run: npx playwright install chromium --with-deps

      - name: 🤖 Run auto-publisher
        id: publisher
        env:
          CI: true
          HEADLESS: true
          CI_SKIP_SCREENSHOTS: 'false'  # Set to 'true' to skip screenshots for speed
          DZEN_COOKIES_JSON: ${{ secrets.DZEN_COOKIES_JSON }}
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [ "$CURRENT_HOUR" -ge 23 ] || [ "$CURRENT_HOUR" -lt 07 ]; then
            echo "🌙 NIGHT MODE ACTIVE ($CURRENT_HOUR:00). Skipping."
            exit 0
          fi
          # Increased timeout to 600s (10 min) for image upload processing
          timeout 600 npx tsx scripts/publish-dzen.ts 2>&1 | tee publish.log
          PUBLISHER_EXIT=$?
          echo "publisher_status=$PUBLISHER_EXIT" >> $GITHUB_OUTPUT
          mv publish.log publish-$(date +%s).log || true
        continue-on-error: true

      - name: 📊 Check results
        if: always()
        run: |
          if [ ${{ steps.publisher.outputs.publisher_status }} -eq 0 ]; then
            echo "✅ Publisher completed successfully!"
          else
            echo "⚠️  Publisher completed with warnings or errors"
          fi

      - name: 💾 Commit and push updates
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions Bot"
          
          # Save debug screenshots to separate directory
          mkdir -p .github/debug-screenshots
          cp *.html .github/debug-screenshots/ 2>/dev/null || true
          cp *.png .github/debug-screenshots/ 2>/dev/null || true
          
          # Add published articles
          git add "!posts/PRODUCTION_READY/published_articles.txt" 2>/dev/null || true
          
          # Add debug screenshots
          git add ".github/debug-screenshots/*.html" 2>/dev/null || true
          git add ".github/debug-screenshots/*.png" 2>/dev/null || true
          
          # Add publish logs
          git add "publish-*.log" 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit"
          else
            git commit -m "🤖 Auto-publish debug: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" || echo "⚠️  Commit failed"
            git pull --rebase origin main || (git rebase --abort && git pull origin main)
            git push origin main
            echo "✅ Successfully pushed debug artifacts!"
          fi

  notify-on-error:
    runs-on: ubuntu-latest
    needs: publish
    if: failure()
    steps:
      - name: 🔔 Notify on failure
        run: echo "⚠️  Workflow failed! https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: 📧 Send Email Notification
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ❌ Dzen Auto-Publisher Failed
          body: |
            The auto-publishing workflow failed.
            Repository: ${{ github.repository }}
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: sheepoff@gmail.com
          from: Dzen Bot
          secure: true
        continue-on-error: true
